name: Microsoft Services IP-Lists

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate_lists:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Generate endpoint lists
        run: |
          mkdir -p docs/{aggregate,azure,o365}
          python3 ./generate_lists.py all

      - name: Commit generated content
        if: github.event_name != 'pull_request'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh generated Microsoft endpoint lists"
          git push
